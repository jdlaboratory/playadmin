<!-- 토스트 -->
<div id="toast" class="hidden fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg z-50 text-sm"></div>

<script>
// ───────── 초기화 ─────────
const cfg = window.APP_CONFIG || {};
const configured = cfg.SUPABASE_URL && !cfg.SUPABASE_URL.includes("YOUR-PROJECT") && cfg.SUPABASE_ANON_KEY && !cfg.SUPABASE_ANON_KEY.includes("여기에");
let sb = null;
if (configured) sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

const $ = (id) => document.getElementById(id);
const normPhone = (s) => (s || "").replace(/\D/g, "");
const fmtPhone = (p) => {
  p = normPhone(p);
  if (p.length === 11) return p.replace(/(\d{3})(\d{4})(\d{4})/, "$1-$2-$3");
  if (p.length === 10) return p.replace(/(\d{3})(\d{3})(\d{4})/, "$1-$2-$3");
  return p;
};
const esc = (s) => (s || "").replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
function fmtDate(ts) {
  if (!ts) return "-";
  // 기기 시간대와 무관하게 항상 한국(서울) 시간으로 표시 → "YYYY-MM-DD HH:mm"
  return new Date(ts).toLocaleString("sv-SE", {
    timeZone: "Asia/Seoul",
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit",
  });
}
function toast(msg, ok = true) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "fixed top-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg z-50 text-sm " + (ok ? "bg-slate-900 text-white" : "bg-red-600 text-white");
  t.classList.remove("hidden");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.add("hidden"), 2200);
}

// ───────── 세션 안정화 ─────────
let manualLogout = false;
function isAuthErr(e) {
  if (!e) return false;
  const msg = (e.message || "") + " " + (e.hint || "");
  return e.code === "PGRST301" || e.status === 401 || /jwt|token|expired|unauthor/i.test(msg);
}
function handleSessionLost() {
  if (!$("appView").classList.contains("hidden")) {
    show("login");
    toast("세션이 만료되어 다시 로그인해 주세요", false);
  }
}
// 인증 만료로 실패하면 토큰을 갱신하고 1회 자동 재시도
async function q(run) {
  let res = await run();
  if (res && res.error && isAuthErr(res.error)) {
    const { data, error } = await sb.auth.refreshSession();
    if (error || !data || !data.session) { handleSessionLost(); return res; }
    res = await run();
  }
  return res;
}
if (sb) {
  // 세션이 끊기면 깔끔하게 로그인 화면으로
  sb.auth.onAuthStateChange((event, session) => {
    if (event === "SIGNED_OUT" && !manualLogout) handleSessionLost();
  });
  // 태블릿이 절전에서 깨어나면(탭이 다시 보이면) 세션 점검·복구
  document.addEventListener("visibilitychange", async () => {
    if (document.visibilityState !== "visible") return;
    if ($("appView").classList.contains("hidden")) return;
    const { data } = await sb.auth.getSession();
    if (!data.session) { await sb.auth.refreshSession(); }
    const after = await sb.auth.getSession();
    if (!after.data.session) handleSessionLost();
  });
}

// ───────── 인증 ─────────
async function initAuth() {
  if (!configured) {
    show("login");
    $("loginErr").textContent = "설정 필요: config.js에 Supabase 정보를 입력하세요.";
    $("loginBtn").disabled = true;
    return;
  }
  const { data } = await sb.auth.getSession();
  if (data.session) { show("app"); renderTab("stamp"); requestAnimationFrame(sizeKeypad); }
  else show("login");
}
function show(view) {
  $("loginView").classList.toggle("hidden", view !== "login");
  $("appView").classList.toggle("hidden", view !== "app");
}
$("loginBtn").onclick = async () => {
  const pw = $("pw").value.trim();
  if (!pw) return;
  $("loginErr").textContent = "";
  $("loginBtn").disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email: cfg.ADMIN_EMAIL, password: pw });
  $("loginBtn").disabled = false;
  if (error) { $("loginErr").textContent = "비밀번호가 올바르지 않습니다."; return; }
  $("pw").value = "";
  show("app"); renderTab("stamp"); requestAnimationFrame(sizeKeypad);
};
$("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") $("loginBtn").click(); });
$("logoutBtn").onclick = async () => { manualLogout = true; await sb.auth.signOut(); show("login"); manualLogout = false; };

// ───────── 키패드 ─────────
let currentTab = "stamp";
const tabInputId = { stamp: "s_phone", coupon: "c_phone", list: "l_q" };
function activePhoneEl() {
  const ae = document.activeElement;
  if (ae && ["s_phone", "c_phone", "l_q", "m_phone"].includes(ae.id)) return ae;
  return $(tabInputId[currentTab]);
}
$("keypad").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-k]");
  if (!b) return;
  const el = activePhoneEl();
  if (!el) return;
  const k = b.dataset.k;
  if (k === "back") el.value = el.value.slice(0, -1);
  else if (k === "clear") el.value = "";
  else el.value += k;
  el.dispatchEvent(new Event("input"));
});

// 키패드 버튼을 정사각형으로 — 단, 세로 영역(하단 네비 전)을 넘지 않게 크기 자동 계산
function sizeKeypad() {
  const kp = $("keypad");
  if (!kp || $("appView").classList.contains("hidden")) return;
  const wrap = kp.parentElement;             // 세로 가용 공간을 가진 래퍼
  const numKeys = kp.querySelectorAll('button[data-k]:not([data-k="clear"])');
  const clearKey = kp.querySelector('button[data-k="clear"]');

  // 좁은 화면(세로/모바일)에서는 기본 클래스 크기 사용 → 인라인 스타일 제거
  if (window.innerWidth < 768) {
    kp.style.gridTemplateColumns = "";
    kp.style.justifyContent = "";
    numKeys.forEach((b) => { b.style.height = b.style.width = b.style.fontSize = ""; });
    if (clearKey) { clearKey.style.height = clearKey.style.fontSize = ""; }
    return;
  }

  const gap = 8;          // gap-2
  const clearH = 56;      // 전체삭제 행 높이(가로 막대)
  const availH = wrap.clientHeight;
  const availW = wrap.clientWidth;
  const sqH = (availH - clearH - gap - 3 * gap) / 4;   // 숫자 4행 + 행간 3 + clear 앞 1
  const sqW = (availW - 2 * gap) / 3;
  let sq = Math.floor(Math.min(sqH, sqW));
  sq = Math.max(44, Math.min(sq, 180));

  kp.style.gridTemplateColumns = `repeat(3, ${sq}px)`;
  kp.style.justifyContent = "center";
  const fs = Math.round(sq * 0.36);
  numKeys.forEach((b) => {
    b.style.width = sq + "px";
    b.style.height = sq + "px";
    b.style.fontSize = fs + "px";
  });
  if (clearKey) { clearKey.style.height = clearH + "px"; clearKey.style.fontSize = "18px"; }
}
window.addEventListener("resize", sizeKeypad);

// ───────── 탭 ─────────
document.querySelectorAll(".tab-btn").forEach((b) => {
  b.onclick = () => {
    document.querySelectorAll(".tab-btn").forEach((x) => x.classList.remove("active"));
    b.classList.add("active");
    renderTab(b.dataset.tab);
  };
});
function renderTab(tab) {
  currentTab = tab;
  const onStats = tab === "stats";
  $("keypadAside").classList.toggle("hidden", onStats); // 통계 탭에선 키패드 숨김
  if (tab === "stamp") renderStamp();
  else if (tab === "coupon") renderCoupon();
  else if (tab === "list") renderList();
  else renderStats();
  if (!onStats) requestAnimationFrame(sizeKeypad);
}

// 부분검색 드롭다운 (스탬프/쿠폰 공용)
function attachPhoneSearch(input, box, onPick) {
  let seq = 0;
  input.addEventListener("input", async () => {
    const d = normPhone(input.value);
    const my = ++seq;
    if (d.length < 2) { box.classList.add("hidden"); box.innerHTML = ""; return; }
    const { data } = await q(() => sb.from("customers").select("phone,name,stamps,coupons").ilike("phone", `%${d}%`).order("phone").limit(8));
    if (my !== seq) return; // 오래된 응답 무시
    if (!data || !data.length) { box.classList.add("hidden"); box.innerHTML = ""; return; }
    box.innerHTML = data.map((c) => `
      <button data-phone="${c.phone}" class="block w-full text-left px-4 py-3 hover:bg-slate-50 border-b last:border-0">
        <span class="font-semibold">${fmtPhone(c.phone)}</span> ${c.name ? `<span class="text-slate-500">${esc(c.name)}</span>` : ""}
        <span class="text-xs text-slate-400 block">스탬프 ${c.stamps} · 보유쿠폰 ${c.coupons}</span>
      </button>`).join("");
    box.classList.remove("hidden");
  });
  box.addEventListener("click", (e) => {
    const b = e.target.closest("button[data-phone]");
    if (!b) return;
    input.value = b.dataset.phone;
    box.classList.add("hidden"); box.innerHTML = "";
    onPick && onPick(b.dataset.phone);
  });
}

// ── 스탬프 입력 ──
function renderStamp() {
  $("tabContent").innerHTML = `
    <div class="bg-white rounded-2xl shadow p-5">
      <h2 class="font-bold text-lg mb-4">스탬프 적립</h2>
      <label class="block text-sm text-slate-500">전화번호 (일부만 입력해도 검색)</label>
      <div class="relative">
        <input id="s_phone" inputmode="numeric" autocomplete="off" placeholder="01012345678"
               class="w-full border rounded-xl px-4 py-3 mt-1 text-lg" />

// ── 통계 (일/주/월별 스탬프 적립·쿠폰 사용) ──
let statsGran = "day";
// 일/주별은 선택한 '월', 월별은 선택한 '연도' 기준으로 조회
const _todayKST = new Date().toLocaleDateString("sv-SE", { timeZone: "Asia/Seoul" });
let selY = +_todayKST.slice(0, 4);
let selM = +_todayKST.slice(5, 7);
const _pad = (n) => String(n).padStart(2, "0");
const _ymd = (s) => { const [y, m, d] = s.split("-").map(Number); return { y, m, d }; };
const _fmtUTC = (dt) => `${dt.getUTCFullYear()}-${_pad(dt.getUTCMonth() + 1)}-${_pad(dt.getUTCDate())}`;
const kstDateStr = (ts) => new Date(ts).toLocaleDateString("sv-SE", { timeZone: "Asia/Seoul" }); // YYYY-MM-DD
function mondayOf(dateStr) {
  const { y, m, d } = _ymd(dateStr);
  const dt = new Date(Date.UTC(y, m - 1, d));
  const dow = (dt.getUTCDay() + 6) % 7; // 월=0 … 일=6
  dt.setUTCDate(dt.getUTCDate() - dow);
  return _fmtUTC(dt);
}
function bucketKey(dateStr, gran) {
  if (gran === "day") return dateStr;
  if (gran === "month") return dateStr.slice(0, 7);
  return mondayOf(dateStr);
}
function statsRange() {
  if (statsGran === "month") {
    const keys = [];
    for (let m = 1; m <= 12; m++) keys.push(`${selY}-${_pad(m)}`);
    return { keys, cutoff: `${selY}-01-01T00:00:00+09:00`, until: `${selY + 1}-01-01T00:00:00+09:00` };
  }
  const lastDay = new Date(Date.UTC(selY, selM, 0)).getUTCDate();
  if (statsGran === "day") {
    const keys = [];
    for (let d = 1; d <= lastDay; d++) keys.push(`${selY}-${_pad(selM)}-${_pad(d)}`);
    const ny = selM === 12 ? selY + 1 : selY, nm = selM === 12 ? 1 : selM + 1;
    return { keys, cutoff: `${selY}-${_pad(selM)}-01T00:00:00+09:00`, until: `${ny}-${_pad(nm)}-01T00:00:00+09:00` };
  }
  // week: 선택한 월의 날짜들이 속한 주(월~일)
  const firstMon = mondayOf(`${selY}-${_pad(selM)}-01`);
  const lastMon = mondayOf(`${selY}-${_pad(selM)}-${_pad(lastDay)}`);
  const keys = [];
  const c0 = _ymd(firstMon); let curDt = new Date(Date.UTC(c0.y, c0.m - 1, c0.d));
  const lm = _ymd(lastMon); const lastDt = new Date(Date.UTC(lm.y, lm.m - 1, lm.d));
  while (curDt <= lastDt) { keys.push(_fmtUTC(curDt)); curDt.setUTCDate(curDt.getUTCDate() + 7); }
  const untilDt = new Date(lastDt); untilDt.setUTCDate(untilDt.getUTCDate() + 7);
  return { keys, cutoff: keys[0] + "T00:00:00+09:00", until: _fmtUTC(untilDt) + "T00:00:00+09:00" };
}
function statsNav(dir) {
  if (statsGran === "month") selY += dir;
  else { selM += dir; if (selM > 12) { selM = 1; selY++; } else if (selM < 1) { selM = 12; selY--; } }
  renderStampStats();
}
function bucketLabel(key, gran) {
  const g = gran || statsGran;
  if (g === "month") return `${+key.split("-")[1]}월`;
  const { m, d } = _ymd(key);
  if (g === "week") return `${m}/${d}`;
  return `${d}`;
}

async function loadCustomerStats() {

  const { count } = await q(() => sb.from("customers").select("phone", { count: "exact", head: true }));
  if ($("cs_total")) $("cs_total").textContent = (count ?? 0).toLocaleString();

  const rows = [];

  const start = csPage * CS_PAGE_SIZE;
  $("cs_list").innerHTML = csRows.slice(start, start + CS_PAGE_SIZE).map((r, j) => {
    const rank = start + j + 1;
    return `<div class="flex items-center gap-3 py-2.5">
        <div class="w-7 text-center font-bold ${rank <= 3 ? "text-indigo-600" : "text-slate-400"}">${rank}</div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold">${fmtPhone(r.phone)} ${r.name ? `<span class="text-slate-500 font-normal">${esc(r.name)}</span>` : ""}</div>
          <div class="flex flex-wrap items-center gap-1.5 mt-1">
            ${couponChips(r)}
          </div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-lg font-bold text-indigo-600">${r._score}</div>
          <div class="text-[10px] text-slate-400">누적 스탬프</div>
        </div>
      </div>`;
  }).join("");
  $("cs_pager").innerHTML = `
    <button id="cs_prev" class="px-3 py-1.5 border rounded-lg ${csPage <= 0 ? "opacity-40" : ""}">이전</button>
    <span class="text-slate-500">${csPage + 1} / ${pages} · 총 ${total}명</span>
    <button id="cs_next" class="px-3 py-1.5 border rounded-lg ${csPage >= pages - 1 ? "opacity-40" : ""}">다음</button>`;
  $("cs_prev").onclick = () => { if (csPage > 0) { csPage--; renderCsPage(); } };
  $("cs_next").onclick = () => { if (csPage < pages - 1) { csPage++; renderCsPage(); } };
}
async function loadStats() {
  const { keys, cutoff, until } = statsRange();
  const logs = [];
  const PAGE = 1000;
  let from = 0;
  while (true) {
    const { data, error } = await q(() => sb.from("activity_logs").select("kind,amount,created_at").gte("created_at", cutoff).lt("created_at", until).order("created_at").range(from, from + PAGE - 1));
    if (error) { $("st_chart").innerHTML = `<p class="text-red-500 text-center py-8">${esc(error.message)}</p>`; return; }
    logs.push(...data);
    if (data.length < PAGE) break;
    from += PAGE;
  }
  const buckets = {};
  keys.forEach((k) => (buckets[k] = { s: 0, c: 0 }));
  logs.forEach((l) => {
    const key = bucketKey(kstDateStr(l.created_at), statsGran);
    if (!(key in buckets)) return;
    if (l.kind === "stamp") buckets[key].s += l.amount;
    else if (l.kind === "coupon_use") buckets[key].c += 1;
  });
  const totalS = keys.reduce((a, k) => a + buckets[k].s, 0);
  const totalC = keys.reduce((a, k) => a + buckets[k].c, 0);
  $("st_total_s").textContent = totalS + "개";
  $("st_total_c").textContent = totalC + "개";
  const max = Math.max(1, ...keys.map((k) => Math.max(buckets[k].s, buckets[k].c)));
  const bars = keys.map((k) => {
    const b = buckets[k];
    const sh = b.s ? Math.max(4, Math.round((b.s / max) * 100)) : 0;
    const ch = b.c ? Math.max(4, Math.round((b.c / max) * 100)) : 0;
    const val = (b.s || b.c) ? `<span class="text-indigo-600">${b.s}</span><span class="text-slate-300">/</span><span class="text-pink-600">${b.c}</span>` : "";
    return `<div class="flex-1 h-full flex flex-col justify-end items-center min-w-0" title="${bucketLabel(k)}  스탬프 ${b.s} · 쿠폰 ${b.c}">
        <div class="h-4 shrink-0 text-[9px] font-bold leading-none whitespace-nowrap">${val}</div>
        <div class="flex-1 min-h-0 w-full flex items-end justify-center gap-0.5">
          <div class="bg-indigo-600 rounded-t flex-1 max-w-[16px]" style="height:${sh}%"></div>
          <div class="bg-pink-600 rounded-t flex-1 max-w-[16px]" style="height:${ch}%"></div>
        </div>
      </div>`;
  }).join("");
  const labels = keys.map((k) => `<div class="flex-1 text-center text-[10px] text-slate-500 min-w-0 truncate">${bucketLabel(k)}</div>`).join("");
  $("st_chart").innerHTML = `<div class="flex-1 min-h-0 flex items-end gap-0.5">${bars}</div><div class="shrink-0 flex gap-0.5 mt-1 border-t pt-1">${labels}</div>`;
}

// ── 고객 상세(적립/사용 이력) ──
let detailCust = null;
// 보유 쿠폰별 발급일/만료일(발급+2년)/상태 표시
async function loadCouponStatus(phone) {
  const { data, error } = await q(() => sb.from("coupons").select("issued_at").eq("phone", phone).order("issued_at", { ascending: true }));
  if (error) { $("d_coupons").innerHTML = `<p class="text-red-500 text-xs py-2">${esc(error.message)}</p>`; return; }
  if (!data || !data.length) { $("d_coupons").innerHTML = `<p class="text-slate-400 text-xs py-2">보유 중인 쿠폰이 없습니다.</p>`; return; }
  const now = Date.now();
  const dstr = (d) => fmtDate(d).slice(0, 10);
  $("d_coupons").innerHTML = data.map((k) => {
    const issued = new Date(k.issued_at);
    const exp = new Date(k.issued_at); exp.setFullYear(exp.getFullYear() + 2);
    const expired = exp.getTime() < now;
    return `<div class="flex items-center justify-between py-1.5 border-b last:border-0 text-sm">
        <div class="flex items-center gap-2 min-w-0">
          <i class="fa-solid fa-ticket ${expired ? "text-red-400" : "text-pink-600"}"></i>
          <span class="text-slate-600">발급 ${dstr(issued)} · 만료 ${dstr(exp)}</span>
        </div>
        <span class="text-xs font-bold px-2 py-0.5 rounded shrink-0 ${expired ? "bg-red-50 text-red-600" : "bg-pink-50 text-pink-600"}">${expired ? "만료" : "유효"}</span>
      </div>`;
  }).join("");
}
async function openDetail(c) {
  detailCust = c;
  $("d_title").textContent = `${fmtPhone(c.phone)}${c.name ? " · " + c.name : ""}`;
  const dv = (c.coupons_valid ?? c.coupons) || 0, de = c.coupons_expired || 0;
  $("d_summary").textContent = `스탬프 ${c.stamps} · 보유 ${dv}${de ? " · 만료 " + de : ""} · 사용 ${c.coupons_used} · 최근 방문 ${fmtDate(c.updated_at)}`;
  $("d_logs").innerHTML = `<p class="text-slate-400 text-center py-6">불러오는 중...</p>`;
  $("d_coupons").innerHTML = `<p class="text-slate-400 text-xs py-2">불러오는 중...</p>`;
  $("detailModal").classList.remove("hidden");
  loadCouponStatus(c.phone);
  const { data, error } = await q(() => sb.from("activity_logs").select("*").eq("phone", c.phone).order("created_at", { ascending: false }).limit(300));
  if (error) { $("d_logs").innerHTML = `<p class="text-red-500 text-center py-6">${esc(error.message)}</p>`; return; }
  if (!data.length) {
    $("d_logs").innerHTML = `<p class="text-slate-400 text-center py-8 leading-relaxed">기록이 없습니다.<br><span class="text-xs">기존 고객은 과거 이력이 없으며,<br>지금부터의 적립/사용분이 기록됩니다.</span></p>`;
    return;
  }
  $("d_logs").innerHTML = data.map((l) => {
    const stamp = l.kind === "stamp";
    return `<div class="flex items-center justify-between py-2.5 border-b">
        <div>
          <span class="font-semibold ${stamp ? "text-indigo-600" : "text-pink-600"}"><i class="fa-solid ${stamp ? "fa-stamp" : "fa-ticket"} mr-1.5"></i>${stamp ? `스탬프 +${l.amount}개` : "쿠폰 사용 (1장)"}</span>
          <span class="text-xs text-slate-400 block">처리 후 · 잔여 스탬프 ${l.stamps_after ?? "-"} · 보유쿠폰 ${l.coupons_after ?? "-"}</span>
        </div>
        <div class="text-sm text-slate-500 whitespace-nowrap">${fmtDate(l.created_at)}</div>
      </div>`;
  }).join("");
}
$("d_close").onclick = () => $("detailModal").classList.add("hidden");
$("d_close2").onclick = () => $("detailModal").classList.add("hidden");
$("d_edit").onclick = () => { $("detailModal").classList.add("hidden"); if (detailCust) openModal(detailCust); };

// ── 모달(추가/수정) ──
let editing = null;
function openModal(c) {
  editing = c;
  $("modalTitle").textContent = c ? "고객 수정" : "새 고객 추가";
  $("m_phone").value = c ? c.phone : "";
  $("m_stamps").value = c ? c.stamps : 0;
  $("m_coupons").value = c ? c.coupons : 0;
  $("m_used").value = c ? c.coupons_used : 0;
  $("m_name").value = c ? c.name : "";
  $("m_memo").value = c ? c.memo : "";
  $("modalErr").textContent = "";
  $("modal").classList.remove("hidden");
}
$("modalCancel").onclick = () => $("modal").classList.add("hidden");
$("modalSave").onclick = async () => {
  const phone = normPhone($("m_phone").value);
  if (phone.length < 9) { $("modalErr").textContent = "전화번호를 확인하세요"; return; }
  const payload = {
    phone,
    stamps: Math.max(0, parseInt($("m_stamps").value, 10) || 0),
    coupons: Math.max(0, parseInt($("m_coupons").value, 10) || 0),
    coupons_used: Math.max(0, parseInt($("m_used").value, 10) || 0),
    name: $("m_name").value.trim(),
    memo: $("m_memo").value.trim(),
  };
  let res;
  if (editing) res = await q(() => sb.from("customers").update(payload).eq("id", editing.id));
  else res = await q(() => sb.from("customers").insert(payload));
  if (res.error) {
    $("modalErr").textContent = res.error.code === "23505" ? "이미 등록된 전화번호입니다" : res.error.message;
    return;
  }
  // 보유 쿠폰 수 변경 시 쿠폰 행(발급일) 동기화 — 추가분은 오늘 발급, 감소분은 오래된 것부터 제거
  const oldCoupons = editing ? (editing.coupons || 0) : 0;
  const delta = payload.coupons - oldCoupons;
  if (delta > 0) {
    await q(() => sb.from("coupons").insert(Array.from({ length: delta }, () => ({ phone }))));
  } else if (delta < 0) {
    const { data: ids } = await q(() => sb.from("coupons").select("id").eq("phone", phone).order("issued_at", { ascending: true }).limit(-delta));
    if (ids && ids.length) await q(() => sb.from("coupons").delete().in("id", ids.map((x) => x.id)));
  }
  $("modal").classList.add("hidden");
  toast("저장 완료"); loadList();
};

// ── 다운로드 모달 ──
$("dlCancel").onclick = () => $("dlModal").classList.add("hidden");
$("dlGo").onclick = async () => {
  const sel = document.querySelector('input[name="dlrange"]:checked').value;
  const labelMap = { "1": "최근1개월", "6": "최근6개월", "12": "최근12개월", "all": "전체" };
  let cutoff = null;
  if (sel !== "all") {
    const d = new Date();
    d.setMonth(d.getMonth() - parseInt(sel, 10));
    cutoff = d.toISOString();
  }
  $("dlGo").disabled = true;
  $("dlInfo").textContent = "조회 중...";
  const phones = [];
  const PAGE = 1000;
  let from = 0;
  while (true) {
    const { data, error } = await q(() => {
      let query = sb.from("customers").select("phone").order("phone").range(from, from + PAGE - 1);
      if (cutoff) query = query.gte("updated_at", cutoff);
      return query;
    });
    if (error) { $("dlInfo").textContent = "오류: " + error.message; $("dlGo").disabled = false; return; }
    phones.push(...data.map((r) => r.phone));
    if (data.length < PAGE) break;
    from += PAGE;
  }
  const csv = "﻿전화번호\n" + phones.join("\n") + "\n";
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = fmtDate(new Date()).slice(0, 10).replace(/-/g, "");
  a.href = url;
  a.download = `전화번호_${labelMap[sel]}_${today}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  $("dlGo").disabled = false;
  $("dlInfo").textContent = "";
  $("dlModal").classList.add("hidden");
  toast(`${phones.length}건 다운로드 완료`);
};

// 시작
initAuth();
</script>
