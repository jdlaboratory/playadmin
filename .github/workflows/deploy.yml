name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # 연속 푸시 시 배포가 서로 취소되어 실패하는 것을 막기 위해 취소 대신 대기(queue)
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web        # web/ 폴더 내용을 사이트 루트로 배포
      - id: deployment
        uses: actions/deploy-pages@v4
